version: '3.8'

services:
  pippastoes:
    build: .
    container_name: pippastoes
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      SOURCE_CHANNEL_ID: ${SOURCE_CHANNEL_ID}
      DESTINATION_CHANNEL_ID: ${DESTINATION_CHANNEL_ID}
    volumes:
      - ./logs:/app/logs
    # Optional: uncomment if you prefer mounting a .env file
    # env_file:
    #   - .env
